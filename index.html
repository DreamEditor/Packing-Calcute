<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>包装计算器 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
        .ios-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 16px;
            margin-bottom: 16px;
        }
        .ios-input {
            width: 100%; padding: 10px 12px;
            background-color: #f3f4f6; border-radius: 10px;
            border: 1px solid transparent; outline: none; transition: all 0.2s;
        }
        .ios-input:focus { border-color: #3b82f6; background-color: #fff; }
    </style>
</head>
<body class="bg-gray-100 pb-44">

<div class="max-w-md mx-auto p-4 pt-6">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 px-2">包装计算器 Pro</h1>

    <div class="ios-card border-l-4 border-blue-500">
        <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">基础尺寸与财务设定</h2>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1">包装长度 Length (mm)</label>
                <input type="number" id="g-length" class="ios-input font-semibold" placeholder="输入长度" value="" oninput="calculate()">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">包装宽度 Width (mm)</label>
                <input type="number" id="g-width" class="ios-input font-semibold" placeholder="输入宽度" value="" oninput="calculate()">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1">原料单价 (Taka / kg)</label>
                <input type="number" id="g-price" class="ios-input font-semibold text-blue-600" value="480" oninput="calculate()">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 flex items-center text-red-500">
                    生产损耗率 Wastage (%)
                </label>
                <input type="number" id="g-wastage" class="ios-input font-semibold text-red-500 bg-red-50" step="0.5" value="3.0" oninput="calculate()">
            </div>
        </div>
    </div>

    <div class="ios-card border-l-4 border-purple-500">
        <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">印刷与复合辅料 (GSM: g/m²)</h2>
        <div class="grid grid-cols-3 gap-3">
            <div>
                <label class="block text-xs text-gray-500 mb-1">油墨 Ink</label>
                <input type="number" id="g-ink" class="ios-input text-sm" step="0.1" value="2.0" oninput="calculate()">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">胶水 Adh 1</label>
                <input type="number" id="g-adh1" class="ios-input text-sm" step="0.1" value="1.5" oninput="calculate()">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">胶水 Adh 2</label>
                <input type="number" id="g-adh2" class="ios-input text-sm" step="0.1" value="1.5" oninput="calculate()">
            </div>
        </div>
    </div>

    <div id="layers-container"></div>

</div>

<div class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] pb-safe pt-4 px-4 rounded-t-3xl z-50 max-w-md mx-auto border-t border-gray-100" style="padding-bottom: env(safe-area-inset-bottom);">
    
    <div class="flex justify-between items-center mb-3 px-2">
        <div class="flex flex-col">
            <span class="text-gray-500 text-xs font-medium">单袋总克重</span>
            <div class="text-xl font-black text-gray-800"><span id="res-weight">0.000</span> <span class="text-sm font-normal text-gray-500">g</span></div>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-blue-500 text-xs font-medium">每公斤产量</span>
            <div class="text-xl font-bold text-blue-600"><span id="res-yield">0</span> <span class="text-sm font-normal text-blue-400">袋</span></div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-5">
        <div class="bg-gray-50 rounded-2xl p-3 text-center border border-gray-100">
            <div class="text-[10px] text-gray-400 mb-1 font-medium uppercase tracking-wide">理论成本 (0损耗)</div>
            <div class="text-lg font-semibold text-gray-600"><span id="res-cost-base">0.0000</span></div>
        </div>
        <div class="bg-emerald-50 rounded-2xl p-3 text-center border border-emerald-100 relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-red-500 text-white text-[8px] px-1.5 py-0.5 rounded-bl-lg font-bold" id="badge-wastage">+3%</div>
            <div class="text-[10px] text-emerald-600 mb-1 font-bold uppercase tracking-wide">实际单袋成本 (Taka)</div>
            <div class="text-xl font-black text-emerald-700"><span id="res-cost-actual">0.0000</span></div>
        </div>
    </div>
</div>

<script>
    const materialData = {
        "PET": { name: "Polyester (PET)", density: 1.39, defaultThick: 12 },
        "VMPET": { name: "Metalized PET", density: 1.39, defaultThick: 12 },
        "VMCPP": { name: "Metalized CPP", density: 0.90, defaultThick: 25 },
        "BOPP": { name: "BOPP", density: 0.91, defaultThick: 20 },
        "LDPE": { name: "LDPE", density: 0.92, defaultThick: 50 },
        "PAPER": { name: "Paper", density: 0.80, defaultThick: 40 },
        "AL": { name: "Aluminium", density: 2.70, defaultThick: 7 },
        "CUSTOM": { name: "Custom (自定义)", density: "", defaultThick: "" }
    };

    const defaultLayers = ["PET", "VMPET", "LDPE"];
    const container = document.getElementById('layers-container');

    defaultLayers.forEach((matKey, index) => {
        let optionsHtml = '';
        for (const [key, val] of Object.entries(materialData)) {
            optionsHtml += `<option value="${key}" ${key === matKey ? 'selected' : ''}>${val.name}</option>`;
        }

        const layerHtml = `
        <div class="ios-card">
            <h2 class="text-sm font-semibold text-gray-700 mb-3 flex items-center">
                <span class="bg-gray-800 text-white w-6 h-6 rounded-full inline-flex items-center justify-center mr-2 text-xs">${index + 1}</span>
                第 ${index + 1} 层薄膜
            </h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">材质 (Material)</label>
                    <select id="l${index}-mat" class="ios-input font-medium bg-gray-50" onchange="updateDensity(${index})">
                        ${optionsHtml}
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">厚度 (μm)</label>
                        <input type="number" id="l${index}-thick" class="ios-input text-blue-700 font-semibold" step="0.5" value="${materialData[matKey].defaultThick}" oninput="calculate()">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">密度 (g/cm³)</label>
                        <input type="number" id="l${index}-density" class="ios-input text-gray-600" step="0.01" value="${materialData[matKey].density}" oninput="calculate()">
                    </div>
                </div>
            </div>
        </div>`;
        container.insertAdjacentHTML('beforeend', layerHtml);
    });

    function updateDensity(layerIndex) {
        const matKey = document.getElementById(`l${layerIndex}-mat`).value;
        const data = materialData[matKey];
        if (matKey !== "CUSTOM") {
            document.getElementById(`l${layerIndex}-density`).value = data.density;
            document.getElementById(`l${layerIndex}-thick`).value = data.defaultThick;
        }
        calculate();
    }

    function calculate() {
        const lengthMm = parseFloat(document.getElementById('g-length').value) || 0;
        const widthMm = parseFloat(document.getElementById('g-width').value) || 0;
        const price = parseFloat(document.getElementById('g-price').value) || 0;
        const wastageRate = parseFloat(document.getElementById('g-wastage').value) || 0;

        const areaCm2 = (lengthMm / 10) * (widthMm / 10); 
        const areaM2 = (lengthMm / 1000) * (widthMm / 1000); 

        let totalWeight = 0;

        for (let i = 0; i < 3; i++) {
            const thickMicrons = parseFloat(document.getElementById(`l${i}-thick`).value) || 0;
            const density = parseFloat(document.getElementById(`l${i}-density`).value) || 0;
            const layerWeight = areaCm2 * (thickMicrons / 10000) * density;
            totalWeight += layerWeight;
        }

        const inkGsm = parseFloat(document.getElementById('g-ink').value) || 0;
        const adh1Gsm = parseFloat(document.getElementById('g-adh1').value) || 0;
        const adh2Gsm = parseFloat(document.getElementById('g-adh2').value) || 0;

        const inkWeight = areaM2 * inkGsm;
        const adh1Weight = areaM2 * adh1Gsm;
        const adh2Weight = areaM2 * adh2Gsm;

        totalWeight += inkWeight + adh1Weight + adh2Weight;

        const yieldPerKg = totalWeight > 0 ? (1000 / totalWeight) : 0;
        
        const theoreticalCost = (totalWeight / 1000) * price;
        const actualCost = theoreticalCost * (1 + (wastageRate / 100));

        document.getElementById('res-weight').innerText = totalWeight.toFixed(3);
        document.getElementById('res-yield').innerText = Math.floor(yieldPerKg).toLocaleString();
        
        document.getElementById('res-cost-base').innerText = theoreticalCost.toFixed(4);
        document.getElementById('res-cost-actual').innerText = actualCost.toFixed(4);
        
        document.getElementById('badge-wastage').innerText = `+${wastageRate}%`;
    }

    window.onload = calculate;
</script>
</body>
</html>
